name: udplb
artifactStorePath: .forge/artifact-store.yaml
envFile: .envrc

# ----------------------------------------------------------------------
# -- test
test:
  - name: lint-tags
    runner: go://go-lint-tags
    spec:
      expectedTags: ["unit", "integration", "e2e", "benchmark", "functional"]

  - name: lint-licenses
    runner: go://generic-test-runner
    spec:
      command: "./hack/ensure-licenses.sh"

  - name: lint
    runner: go://go-lint

  - name: unit
    runner: go://go-test

  - name: e2e
    testenv: alias://e2e-testenv
    runner: go://go-test

# ----------------------------------------------------------------------
# -- build
build:
  # Protobuf compilation
  # Matches Makefile: protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative <file>
  - name: generate-protobuf
    src: ./pkg/apis
    engine: go://generic-builder
    spec:
      command: "sh"
      args:
        - "-c"
        - |
          for proto in $(find ./pkg/apis -name '*.proto'); do
            protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative "$proto"
          done

  # Mock generation via mockery v3 -- reads .mockery.yaml
  - name: generated-mocks
    src: ./.mockery.yaml
    dest: ./internal/types/mocks
    engine: go://go-gen-mocks

  # eBPF compilation (standalone build step -- engine needs src/dest)
  - name: generate-bpf
    src: ./internal/adapter/bpf/udplb_kern.c
    dest: ./internal/adapter/bpf
    engine: go://go-gen-bpf
    spec:
      ident: udplb
      goPackage: bpfadapter
      outputStem: zz_generated
      tags: ["linux"]

  # Convenience target: chain protobuf + bpf + go generate
  - name: generate-all
    src: .
    engine: go://generic-builder
    spec:
      command: "sh"
      args:
        - "-c"
        - "forge build generate-protobuf && forge build generate-bpf && go generate ./..."

  # Code formatting
  - name: format
    src: .
    engine: go://go-format

  # Binary
  - name: udplb
    src: ./cmd/udplb
    dest: ./build/bin
    engine: go://go-build
    spec:
      env:
        CGO_ENABLED: "0"

  # E2E support binaries
  - name: udplb-traffic-gen
    src: ./cmd/udplb-traffic-gen
    dest: ./build/bin
    engine: go://go-build
    spec:
      env:
        CGO_ENABLED: "0"
        GOOS: "linux"
        GOARCH: "amd64"

  - name: udplb-echo-backend
    src: ./cmd/udplb-echo-backend
    dest: ./build/bin
    engine: go://go-build
    spec:
      env:
        CGO_ENABLED: "0"
        GOOS: "linux"
        GOARCH: "amd64"

# ----------------------------------------------------------------------
# -- engines defines reusable build engines with custom configurations
engines:
  # E2E test environment using testenv-vm with libvirt
  # 8-VM topology: router + client + 3 LBs + 3 backends on flat L2 (10.100.0.0/24)
  - alias: e2e-testenv
    type: testenv
    testenv:
      - engine: go://testenv-stub
        spec:
          udpTestPort: '{{ allocateOpenPort "0.0.0.0" "udplb-e2e-udp" 10000 32767 }}'

      - engine: go://github.com/alexandremahdhaoui/testenv-vm/cmd/testenv-vm@v0.15.0
        deferTemplates: true
        spec:
          # Use /tmp for state directory so libvirt can access disk images
          stateDir: /tmp/udplb-testenv-vm
          images:
            - name: udplb-base
              spec:
                source: ubuntu:24.04
                customize:
                  packages:
                    - socat
                    - curl
                    - frr
                    - iproute2
                    - tcpdump
          providers:
            - name: libvirt
              engine: go://github.com/alexandremahdhaoui/testenv-vm/cmd/providers/testenv-vm-provider-libvirt@v0.15.0
              default: true
              spec: {}

          keys:
            - name: VmSsh
              provider: libvirt
              spec:
                type: ed25519

          networks:
            - name: UdplbNet
              kind: nat
              provider: libvirt
              spec:
                cidr: "10.100.0.0/24"
                # Disable libvirt DHCP - use static IPs via cloud-init networkConfig
                dhcp:
                  enabled: false

          vms:
            # router: FRR BGP router, AS 65000, peers with all 3 LBs
            - name: router
              provider: libvirt
              spec:
                memory: 512
                vcpus: 1
                network: UdplbNet
                disk:
                  baseImage: "{{ .Images.udplb-base.Path }}"
                  size: 4G
                cloudInit:
                  hostname: router
                  networkConfig:
                    ethernets:
                      - name: "en*"
                        addresses:
                          - "10.100.0.2/24"
                        gateway4: "10.100.0.1"
                        nameservers:
                          addresses:
                            - "8.8.8.8"
                  users:
                    - name: ubuntu
                      sudo: "ALL=(ALL) NOPASSWD:ALL"
                      sshAuthorizedKeys:
                        - "{{ .Keys.VmSsh.PublicKey }}"
                  runcmd:
                    - "sysctl -w net.ipv4.ip_forward=1"
                    - "sysctl -w net.ipv4.conf.all.rp_filter=0"
                    - "sysctl -w net.ipv4.conf.default.rp_filter=0"
                    # send_redirects uses OR(all, interface) — must disable on every interface
                    - "for f in /proc/sys/net/ipv4/conf/*/send_redirects; do echo 0 > \"$f\"; done"
                    - "nft flush ruleset || true"
                    - "iptables -P FORWARD ACCEPT || true"
                    - "iptables -F FORWARD || true"
                    - "ufw disable || true"
                    - "sed -i 's/^bgpd=no/bgpd=yes/' /etc/frr/daemons"
                    - "sed -i 's/^zebra=no/zebra=yes/' /etc/frr/daemons"
                    - |
                      cat > /etc/frr/frr.conf << 'FRREOF'
                      frr defaults traditional
                      hostname router
                      router bgp 65000
                       no bgp ebgp-requires-policy
                       bgp router-id 10.100.0.2
                       neighbor 10.100.0.10 remote-as 65001
                       neighbor 10.100.0.11 remote-as 65001
                       neighbor 10.100.0.12 remote-as 65001
                       address-family ipv4 unicast
                        maximum-paths 3
                       exit-address-family
                      FRREOF
                    - "chown frr:frr /etc/frr/frr.conf"
                    - "chmod 0640 /etc/frr/frr.conf"
                    - "systemctl restart frr"
                boot:
                  order: [hd]
                  firmware: bios
                readiness:
                  ssh:
                    enabled: true
                    timeout: "90s"
                    user: ubuntu
                    privateKey: "{{ .Keys.VmSsh.PrivateKeyPath }}"

            # client: traffic generator, routes VIP via router
            - name: client
              provider: libvirt
              spec:
                memory: 512
                vcpus: 1
                network: UdplbNet
                disk:
                  baseImage: "{{ .Images.udplb-base.Path }}"
                  size: 4G
                cloudInit:
                  hostname: client
                  networkConfig:
                    ethernets:
                      - name: "en*"
                        addresses:
                          - "10.100.0.100/24"
                        gateway4: "10.100.0.1"
                        nameservers:
                          addresses:
                            - "8.8.8.8"
                  users:
                    - name: ubuntu
                      sudo: "ALL=(ALL) NOPASSWD:ALL"
                      sshAuthorizedKeys:
                        - "{{ .Keys.VmSsh.PublicKey }}"
                  runcmd:
                    # accept_redirects uses OR(all, interface) — must disable on every interface
                    - "for f in /proc/sys/net/ipv4/conf/*/accept_redirects; do echo 0 > \"$f\"; done"
                    - "ip route add 10.100.0.200/32 via 10.100.0.2"
                boot:
                  order: [hd]
                  firmware: bios
                readiness:
                  ssh:
                    enabled: true
                    timeout: "90s"
                    user: ubuntu
                    privateKey: "{{ .Keys.VmSsh.PrivateKeyPath }}"

            # lb-0: Load balancer 0, AS 65001, announces VIP via BGP
            - name: lb-0
              provider: libvirt
              spec:
                memory: 1024
                vcpus: 2
                network: UdplbNet
                disk:
                  baseImage: "{{ .Images.udplb-base.Path }}"
                  size: 4G
                cloudInit:
                  hostname: lb-0
                  networkConfig:
                    ethernets:
                      - name: "en*"
                        addresses:
                          - "10.100.0.10/24"
                        gateway4: "10.100.0.1"
                        nameservers:
                          addresses:
                            - "8.8.8.8"
                  users:
                    - name: ubuntu
                      sudo: "ALL=(ALL) NOPASSWD:ALL"
                      sshAuthorizedKeys:
                        - "{{ .Keys.VmSsh.PublicKey }}"
                  runcmd:
                    - "sysctl -w net.ipv4.conf.all.arp_ignore=1"
                    - "sysctl -w net.ipv4.conf.all.arp_announce=2"
                    - "ip addr add 10.100.0.200/32 dev lo"
                    - "sed -i 's/^bgpd=no/bgpd=yes/' /etc/frr/daemons"
                    - "sed -i 's/^zebra=no/zebra=yes/' /etc/frr/daemons"
                    - |
                      cat > /etc/frr/frr.conf << 'FRREOF'
                      frr defaults traditional
                      hostname lb-0
                      router bgp 65001
                       no bgp ebgp-requires-policy
                       bgp router-id 10.100.0.10
                       neighbor 10.100.0.2 remote-as 65000
                       address-family ipv4 unicast
                        network 10.100.0.200/32
                       exit-address-family
                      FRREOF
                    - "chown frr:frr /etc/frr/frr.conf"
                    - "chmod 0640 /etc/frr/frr.conf"
                    - "systemctl restart frr"
                boot:
                  order: [hd]
                  firmware: bios
                readiness:
                  ssh:
                    enabled: true
                    timeout: "90s"
                    user: ubuntu
                    privateKey: "{{ .Keys.VmSsh.PrivateKeyPath }}"

            # lb-1: Load balancer 1, AS 65001, announces VIP via BGP
